services:

  api-placemarkers-search:
    image: api-placemarkers-search-image
    container_name: api-placemarkers-search
    build:
      context: .
      dockerfile: ./Docker/RR/Dockerfile
    volumes:
      - ./app:/var/www/html
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      APP_SECRET: 75914121030ad559bbae482519258ce1
      APP_RUNTIME: Baldinof\RoadRunnerBundle\Runtime\Runtime
      VAR_DUMPER_FORMAT: 'server'
      VAR_DUMPER_SERVER: 'buggregator:9912'
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=place_markers_net"
      - "traefik.http.routers.api-placemarkers-search.rule=Host(`api.placemarkers.local`) && PathPrefix(`/search`)"
      - "traefik.http.routers.api-placemarkers-search.entrypoints=web"
      - "traefik.http.routers.api-placemarkers-search.priority=100"
      - "traefik.http.services.api-placemarkers-search.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - place_markers_net

  api-placemarkers-search-php-cli:
    image: api-placemarkers-search-php-cli-image
    build:
      dockerfile: ./Docker/cli/Dockerfile
    container_name: api-placemarkers-search-php-cli
    volumes:
      - ./app:/var/www/html
    networks:
      - place_markers_net

networks:
  place_markers_net:
    external: true
